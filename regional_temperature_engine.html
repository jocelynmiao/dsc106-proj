<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Temperature Response Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f2}
#app{display:grid;grid-template-columns:340px 1fr;grid-template-rows:auto 1fr auto;gap:0;background:#fff;min-height:600px;border:0.5px solid #e0dfd8;border-radius:12px;overflow:hidden;max-width:1100px;margin:16px auto}
#header{grid-column:1/-1;background:#f9f8f5;border-bottom:0.5px solid #e0dfd8;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
#header h2{font-size:13px;font-weight:500;color:#1a1a18;letter-spacing:.02em}
#scenario-rail{display:flex;gap:6px}
.sc-btn{font-size:11px;padding:4px 10px;border:0.5px solid #c8c7bf;border-radius:20px;background:transparent;color:#6b6a64;cursor:pointer;transition:all .15s}
.sc-btn:hover{background:#f0efe9;color:#1a1a18}
.sc-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
#left-panel{border-right:0.5px solid #e0dfd8;display:flex;flex-direction:column;padding:12px}
#sankey-title{font-size:11px;font-weight:500;color:#6b6a64;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
#sankey-svg{width:100%;flex:1}
#right-panel{position:relative;display:flex;flex-direction:column;overflow:hidden}
#map-container{flex:1;position:relative;min-height:300px}
#map-svg{width:100%;height:100%}
#detail-panel{position:absolute;top:8px;right:8px;width:200px;background:#fff;border:0.5px solid #e0dfd8;border-radius:8px;padding:12px;font-size:11px;display:none;z-index:10}
#detail-panel.visible{display:block}
#detail-name{font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:8px}
#detail-temp{font-size:22px;font-weight:500;color:#E24B4A;margin-bottom:8px}
.detail-label{font-size:10px;font-weight:500;color:#6b6a64;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;margin-top:8px}
#dist-strip{height:18px;background:#f0efe9;border-radius:4px;position:relative;overflow:hidden;margin-bottom:2px}
#dist-inner{position:absolute;top:3px;bottom:3px;border-radius:2px;transition:all .4s}
#sparkline-canvas{width:100%;height:48px;margin-top:2px}
.sector-bar{display:flex;height:10px;border-radius:3px;overflow:hidden;gap:1px;margin-top:4px}
.sector-seg{height:100%;transition:width .4s}
.legend-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:#6b6a64}
.legend-dot{width:8px;height:8px;border-radius:1px}
#bottom-bar{grid-column:1/-1;border-top:0.5px solid #e0dfd8;padding:8px 12px;background:#f9f8f5}
#bottom-bar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#bottom-bar-title{font-size:10px;font-weight:500;color:#6b6a64;text-transform:uppercase;letter-spacing:.06em}
#sort-btns{display:flex;gap:4px}
.sort-btn{font-size:10px;padding:2px 8px;border:0.5px solid #c8c7bf;border-radius:10px;background:transparent;color:#6b6a64;cursor:pointer}
.sort-btn.active{background:#6b6a64;color:#fff}
#region-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
#region-strip::-webkit-scrollbar{height:3px}
#region-strip::-webkit-scrollbar-thumb{background:#c8c7bf;border-radius:2px}
.region-card{flex:0 0 auto;width:100px;background:#fff;border:0.5px solid #e0dfd8;border-radius:8px;padding:6px 8px;cursor:pointer;transition:border-color .15s}
.region-card:hover,.region-card.active{border-color:#888}
.rc-name{font-size:10px;font-weight:500;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-temp{font-size:16px;font-weight:500;margin:2px 0}
.rc-bar{height:4px;border-radius:2px;background:#f0efe9;margin-top:3px}
.rc-fill{height:100%;border-radius:2px;transition:width .4s}
.forcing-display{font-size:11px;color:#6b6a64;margin-top:8px;padding-top:8px;border-top:0.5px solid #e0dfd8}
.forcing-val{font-size:18px;font-weight:500;color:#1a1a18}
.pin-btn{position:absolute;top:8px;left:8px;background:#fff;border:0.5px solid #c8c7bf;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;z-index:10;color:#6b6a64}
.pin-btn:hover{background:#f0efe9}
.tooltip{position:absolute;background:#fff;border:0.5px solid #e0dfd8;border-radius:8px;padding:4px 8px;font-size:11px;pointer-events:none;display:none;z-index:20;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.08)}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h2>Regional Temperature Response Engine</h2>
    <div id="scenario-rail">
      <button class="sc-btn" onclick="applyScenario('current',this)">Current policy</button>
      <button class="sc-btn active" onclick="applyScenario('ndc',this)">NDC pledges</button>
      <button class="sc-btn" onclick="applyScenario('ssp245',this)">SSP2-4.5</button>
      <button class="sc-btn" onclick="applyScenario('ssp585',this)">SSP5-8.5</button>
    </div>
  </div>

  <div id="left-panel">
    <div id="sankey-title">Emission flows (drag to adjust)</div>
    <svg id="sankey-svg" viewBox="0 0 310 420"></svg>
    <div class="forcing-display">
      Total absorbed forcing: <span class="forcing-val" id="forcing-val">3.2</span> W/m²
    </div>
  </div>

  <div id="right-panel">
    <button class="pin-btn" id="pin-btn" onclick="pinScenario()">📌 Pin scenario</button>
    <div id="map-container">
      <svg id="map-svg" viewBox="0 0 800 420" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="detail-panel">
      <div id="detail-name">—</div>
      <div id="detail-temp">—</div>
      <div class="detail-label">Model spread (uncertainty)</div>
      <div id="dist-strip"><div id="dist-inner"></div></div>
      <div class="detail-label">Warming trajectory to 2100</div>
      <canvas id="sparkline-canvas"></canvas>
      <div class="detail-label">Sector sensitivity</div>
      <div class="sector-bar" id="sector-bar"></div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>Energy</div>
        <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Transport</div>
        <div class="legend-item"><div class="legend-dot" style="background:#854F0B"></div>Agric.</div>
        <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div>Industry</div>
        <div class="legend-item"><div class="legend-dot" style="background:#533AB7"></div>Land</div>
      </div>
    </div>
    <div class="tooltip" id="map-tooltip"></div>
  </div>

  <div id="bottom-bar">
    <div id="bottom-bar-header">
      <div id="bottom-bar-title">Regions — sorted by</div>
      <div id="sort-btns">
        <button class="sort-btn active" onclick="setSort('warming',this)">Warming</button>
        <button class="sort-btn" onclick="setSort('rate',this)">Rate</button>
        <button class="sort-btn" onclick="setSort('uncertainty',this)">Uncertainty</button>
      </div>
    </div>
    <div id="region-strip"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const SECTOR_COLORS = ['#3B6D11','#185FA5','#854F0B','#993C1D','#533AB7'];
const SECTOR_LABELS = ['Energy','Transport','Agric.','Industry','Land use'];

const SCENARIOS = {
  current: { flows:[0.88,0.80,0.75,0.82,0.72] },
  ndc:     { flows:[0.65,0.60,0.70,0.62,0.55] },
  ssp245:  { flows:[0.55,0.50,0.60,0.52,0.45] },
  ssp585:  { flows:[0.95,0.90,0.85,0.92,0.88] }
};

// [id, name, lat, lon, base_warming, rate_index, uncertainty, sector_weights[5]]
const REGIONS = [
  ['ARO','Arctic Ocean',80,0, 5.2, 0.95, 0.45, [0.25,0.18,0.30,0.12,0.15]],
  ['GRL','Greenland',72,-42, 4.8, 0.90, 0.38, [0.22,0.15,0.32,0.14,0.17]],
  ['NAR','N. America (Arctic)',65,-120, 4.1, 0.85, 0.32, [0.30,0.22,0.25,0.13,0.10]],
  ['WNA','W. North America',48,-115, 2.8, 0.60, 0.22, [0.35,0.28,0.15,0.12,0.10]],
  ['CNA','C. North America',40,-95, 2.6, 0.55, 0.18, [0.38,0.25,0.14,0.13,0.10]],
  ['ENA','E. North America',40,-75, 2.4, 0.50, 0.20, [0.36,0.26,0.14,0.14,0.10]],
  ['CAM','C. America',12,-85, 2.2, 0.45, 0.25, [0.28,0.22,0.20,0.15,0.15]],
  ['NSD','N. South America',5,-60, 2.1, 0.40, 0.35, [0.22,0.15,0.18,0.12,0.33]],
  ['SAM','S. South America',-30,-65, 2.0, 0.42, 0.28, [0.28,0.18,0.22,0.14,0.18]],
  ['NEU','N. Europe',58,15, 2.9, 0.62, 0.18, [0.32,0.30,0.15,0.15,0.08]],
  ['CEU','C. Europe',48,15, 2.7, 0.58, 0.15, [0.34,0.28,0.14,0.16,0.08]],
  ['MED','Mediterranean',38,15, 3.1, 0.70, 0.12, [0.30,0.24,0.18,0.16,0.12]],
  ['SAH','Sahel',15,15, 3.4, 0.72, 0.42, [0.20,0.12,0.28,0.15,0.25]],
  ['WAF','W. Africa',5,5, 2.8, 0.55, 0.38, [0.18,0.12,0.25,0.18,0.27]],
  ['CAF','C. Africa',0,22, 2.6, 0.50, 0.48, [0.15,0.10,0.22,0.18,0.35]],
  ['EAF','E. Africa',0,38, 2.9, 0.58, 0.40, [0.18,0.12,0.25,0.15,0.30]],
  ['SAF','S. Africa',-28,25, 2.5, 0.52, 0.30, [0.22,0.15,0.22,0.18,0.23]],
  ['WAS','W. Asia',28,45, 3.2, 0.68, 0.22, [0.35,0.25,0.15,0.18,0.07]],
  ['CAS','C. Asia',45,65, 3.5, 0.75, 0.28, [0.32,0.22,0.20,0.18,0.08]],
  ['SAS','S. Asia',22,80, 2.8, 0.58, 0.32, [0.25,0.18,0.28,0.18,0.11]],
  ['EAS','E. Asia',35,110, 2.7, 0.55, 0.20, [0.38,0.28,0.14,0.12,0.08]],
  ['SEA','SE Asia',5,115, 2.4, 0.48, 0.30, [0.22,0.18,0.18,0.14,0.28]],
  ['NAU','N. Australia',-20,135, 2.6, 0.52, 0.25, [0.28,0.22,0.22,0.14,0.14]],
  ['SAU','S. Australia',-35,140, 2.3, 0.48, 0.20, [0.30,0.24,0.20,0.14,0.12]],
  ['SIB','Siberia',60,110, 4.5, 0.88, 0.35, [0.28,0.18,0.28,0.14,0.12]],
  ['ANT','Antarctica',-80,0, 3.8, 0.80, 0.50, [0.20,0.12,0.25,0.10,0.10]],
  ['PAC','Pacific Ocean',0,180, 1.8, 0.35, 0.30, [0.28,0.22,0.15,0.15,0.20]],
  ['ATL','Atlantic Ocean',20,-40, 1.9, 0.38, 0.25, [0.30,0.22,0.15,0.15,0.18]],
  ['IND','Indian Ocean',-15,70, 2.0, 0.40, 0.28, [0.28,0.20,0.18,0.15,0.19]],
];

window.REGION_MAP = {};
REGIONS.forEach(r => { window.REGION_MAP[r[0]] = r; });

let flows = [...SCENARIOS.ndc.flows];
let dragging = null, dragStart = null, flowStart = null;
let pinnedState = null;
let sortMode = 'warming';
let selectedRegion = null;
let worldData = null;

function computeForcing(f) {
  const agLand = f[2] * 0.7 + f[4] * 0.3;
  return 1.0 + f[0]*2.8 + f[1]*1.4 + agLand*1.6 + f[3]*1.8;
}

function regionWarming(r, f) {
  const forcing = computeForcing(f);
  const baseForcing = computeForcing(SCENARIOS.ndc.flows);
  const scale = forcing / baseForcing;
  const lat = Math.abs(r[2]);
  const ampFactor = 1.0 + (lat / 90) * 0.8;
  const sw = r[7];
  const sectorEffect = sw[0]*f[0]*0.6 + sw[1]*f[1]*0.4 + sw[2]*f[2]*0.5 + sw[3]*f[3]*0.5 + sw[4]*f[4]*0.7;
  return r[4] * scale * ampFactor * (0.5 + sectorEffect * 0.6);
}

function tempToColor(t, alpha) {
  if (alpha === undefined) alpha = 1;
  const t0 = Math.max(0, Math.min(1, (t - 1.0) / 5.5));
  const r = Math.round(255 * Math.min(1, t0 * 2.5));
  const g = Math.round(255 * Math.max(0, 1 - t0 * 2));
  const b = Math.round(255 * Math.max(0, 0.95 - t0 * 3));
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// ── SANKEY ────────────────────────────────────────────────────────────────
const SECTOR_Y = [30, 90, 150, 210, 270];
const SRC_X = 30, SRC_W = 80, SRC_H = 32;
const TRUNK_X = 155, TRUNK_W = 24;
const OUT_X = 220, OUT_W = 60;

function drawSankey() {
  const svg = document.getElementById('sankey-svg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  function mk(tag, attrs) {
    const el = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  const forcing = computeForcing(flows);
  const totalW = Math.min(70, forcing * 8);

  // Coupling line between Agriculture and Land Use
  const agY = SECTOR_Y[2] + SRC_H/2;
  const luY = SECTOR_Y[4] + SRC_H/2;
  svg.appendChild(mk('line',{x1:SRC_X+SRC_W,y1:agY,x2:SRC_X+SRC_W,y2:luY,
    stroke:'#888','stroke-width':1,'stroke-dasharray':'3 3',opacity:0.5}));
  const dLabel = mk('text',{x:SRC_X+SRC_W+4,y:(agY+luY)/2,
    'font-size':'9','fill':'#888','font-family':'sans-serif'});
  dLabel.textContent = 'co-emit';
  svg.appendChild(dLabel);

  // Source blocks and flow paths
  SECTOR_LABELS.forEach((label, i) => {
    const y = SECTOR_Y[i];
    const w = Math.max(4, flows[i] * 60);
    const cy = y + SRC_H/2;

    const rect = mk('rect',{x:SRC_X,y:y,width:SRC_W,height:SRC_H,
      rx:4,fill:SECTOR_COLORS[i],opacity:0.85,cursor:'ns-resize'});
    rect.addEventListener('mousedown', e => startDrag(e, i));
    svg.appendChild(rect);

    const txt = mk('text',{x:SRC_X+SRC_W/2,y:cy,'text-anchor':'middle',
      'dominant-baseline':'central','font-size':'11','font-weight':'500',
      'fill':'#fff','font-family':'sans-serif',cursor:'ns-resize','pointer-events':'none'});
    txt.textContent = label;
    svg.appendChild(txt);

    const trunkY = 160 + i * 12 - 30;
    svg.appendChild(mk('path',{
      d:'M'+(SRC_X+SRC_W)+' '+cy+' C'+(TRUNK_X-40)+' '+cy+' '+(TRUNK_X-40)+' '+trunkY+' '+TRUNK_X+' '+trunkY,
      fill:'none',stroke:SECTOR_COLORS[i],'stroke-width':Math.max(1.5,w*0.45),
      opacity:0.5,'pointer-events':'none'
    }));

    const wTxt = mk('text',{x:SRC_X-4,y:cy,'text-anchor':'end',
      'dominant-baseline':'central','font-size':'10',
      'fill':'#6b6a64','font-family':'sans-serif'});
    wTxt.textContent = Math.round(flows[i]*100)+'%';
    svg.appendChild(wTxt);
  });

  // Central trunk
  svg.appendChild(mk('rect',{x:TRUNK_X-TRUNK_W/2,y:100,width:TRUNK_W,height:200,
    rx:6,fill:'#888',opacity:0.18}));
  const tLabel = mk('text',{x:TRUNK_X,y:200,'text-anchor':'middle',
    'dominant-baseline':'central','font-size':'9','fill':'#6b6a64','font-family':'sans-serif'});
  tLabel.textContent = 'Total';
  svg.appendChild(tLabel);

  // Absorbed output
  const absorbW = Math.max(4, totalW * 0.78);
  svg.appendChild(mk('path',{
    d:'M'+(TRUNK_X+TRUNK_W/2)+' 150 C'+(OUT_X-30)+' 150 '+(OUT_X-30)+' 150 '+OUT_X+' 150',
    fill:'none',stroke:'#E24B4A','stroke-width':absorbW,opacity:0.6,'pointer-events':'none'
  }));
  svg.appendChild(mk('rect',{x:OUT_X,y:136,width:OUT_W,height:28,rx:4,fill:'#E24B4A',opacity:0.8}));
  const absT = mk('text',{x:OUT_X+OUT_W/2,y:150,'text-anchor':'middle',
    'dominant-baseline':'central','font-size':'10','font-weight':'500','fill':'#fff','font-family':'sans-serif'});
  absT.textContent = 'Absorbed';
  svg.appendChild(absT);

  // Offset output
  const offsetW = Math.max(2, totalW * 0.22);
  svg.appendChild(mk('path',{
    d:'M'+(TRUNK_X+TRUNK_W/2)+' 220 C'+(OUT_X-30)+' 220 '+(OUT_X-30)+' 220 '+OUT_X+' 220',
    fill:'none',stroke:'#888780','stroke-width':offsetW,opacity:0.6,'pointer-events':'none'
  }));
  svg.appendChild(mk('rect',{x:OUT_X,y:206,width:OUT_W,height:28,rx:4,fill:'#888780',opacity:0.7}));
  const offT = mk('text',{x:OUT_X+OUT_W/2,y:220,'text-anchor':'middle',
    'dominant-baseline':'central','font-size':'10','font-weight':'500','fill':'#fff','font-family':'sans-serif'});
  offT.textContent = 'Offset';
  svg.appendChild(offT);

  const hint = mk('text',{x:155,y:412,'text-anchor':'middle',
    'font-size':'10','fill':'#6b6a64','font-family':'sans-serif'});
  hint.textContent = 'Drag sector bars up/down to adjust';
  svg.appendChild(hint);

  document.getElementById('forcing-val').textContent = computeForcing(flows).toFixed(1);
}

function startDrag(e, i) {
  dragging = i; dragStart = e.clientY; flowStart = flows[i];
  e.preventDefault();
}

document.addEventListener('mousemove', e => {
  if (dragging === null) return;
  const dy = (e.clientY - dragStart) / 120;
  flows[dragging] = Math.max(0.05, Math.min(1.0, flowStart - dy));
  if (dragging === 2) flows[4] = Math.max(0.05, flows[4] * (0.85 + flows[2] * 0.15));
  if (dragging === 4) flows[2] = Math.max(0.05, flows[2] * (0.85 + flows[4] * 0.15));
  drawSankey();
  updateMap(true);
  updateBottomBar();
  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
});

document.addEventListener('mouseup', () => { dragging = null; });

// ── MAP ───────────────────────────────────────────────────────────────────
const mapSvg = d3.select('#map-svg');
const projection = d3.geoNaturalEarth1().scale(145).translate([400, 210]);
const pathGen = d3.geoPath(projection);

async function initMap() {
  try {
    worldData = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const countries = topojson.feature(worldData, worldData.objects.countries);

    const grat = d3.geoGraticule()();
    mapSvg.append('path').datum(grat).attr('d', pathGen)
      .attr('fill','none').attr('stroke','rgba(0,0,0,0.08)').attr('stroke-width',0.3);

    mapSvg.append('path').datum({type:'Sphere'}).attr('d', pathGen)
      .attr('fill','rgba(59,139,212,0.08)').attr('stroke','rgba(0,0,0,0.15)').attr('stroke-width',0.5);

    mapSvg.selectAll('.country').data(countries.features).join('path')
      .attr('class','country').attr('d', pathGen)
      .attr('stroke','#fff').attr('stroke-width', 0.4)
      .attr('fill', d => getCountryColor(d))
      .style('cursor','pointer')
      .on('mouseover', (e,d) => showTooltip(e,d))
      .on('mousemove', e => moveTooltip(e))
      .on('mouseout', hideTooltip)
      .on('click', (e,d) => { const r = countryToRegion(d); if(r) openDetailPanel(r); });

    REGIONS.forEach(r => {
      const proj = projection([r[3], r[2]]);
      if (!proj) return;
      const w = regionWarming(r, flows);
      mapSvg.append('circle')
        .attr('class','rdot rdot-'+r[0])
        .attr('cx', proj[0]).attr('cy', proj[1]).attr('r', 4)
        .attr('fill', tempToColor(w)).attr('stroke','rgba(255,255,255,0.7)').attr('stroke-width', 1)
        .style('cursor','pointer')
        .on('mouseover', e => showRegionTooltip(e, r))
        .on('mousemove', e => moveTooltip(e))
        .on('mouseout', hideTooltip)
        .on('click', () => openDetailPanel(r));
    });

    mapSvg.append('g').attr('id','ghost-layer');
    drawLegend();
    updateMap(false);
  } catch(err) {
    mapSvg.append('text').attr('x',400).attr('y',210).attr('text-anchor','middle')
      .attr('fill','#888').attr('font-size',13).text('Map requires an internet connection to load.');
  }
}

function countryToRegion(feature) {
  const centroid = pathGen.centroid(feature);
  if (!centroid || isNaN(centroid[0])) return null;
  const inv = projection.invert(centroid);
  if (!inv) return null;
  const [lx, ly] = inv;
  let best = null, bestD = Infinity;
  REGIONS.forEach(r => {
    const dx = lx - r[3], dy = ly - r[2];
    const d = dx*dx + dy*dy*1.5;
    if (d < bestD) { bestD = d; best = r; }
  });
  return best;
}

function getCountryColor(feature) {
  const r = countryToRegion(feature);
  if (!r) return '#f0efe9';
  return tempToColor(regionWarming(r, flows), 0.85);
}

function updateMap(animate) {
  if (!worldData) return;
  const dur = animate ? 800 : 0;
  mapSvg.selectAll('.country').transition().duration(dur).attr('fill', d => getCountryColor(d));
  REGIONS.forEach(r => {
    const w = regionWarming(r, flows);
    mapSvg.selectAll('.rdot-'+r[0]).transition().duration(dur).attr('fill', tempToColor(w));
  });
  if (selectedRegion) openDetailPanel(selectedRegion);
  if (pinnedState) updateHalos();
}

function drawLegend() {
  const lx = 20, ly = 380, lw = 120, lh = 10;
  const defs = mapSvg.append('defs');
  const grad = defs.append('linearGradient').attr('id','temp-grad').attr('x1',0).attr('x2',1).attr('y1',0).attr('y2',0);
  grad.append('stop').attr('offset','0%').attr('stop-color','rgb(255,255,248)');
  grad.append('stop').attr('offset','50%').attr('stop-color','rgb(255,120,40)');
  grad.append('stop').attr('offset','100%').attr('stop-color','rgb(162,20,20)');
  mapSvg.append('rect').attr('x',lx).attr('y',ly).attr('width',lw).attr('height',lh)
    .attr('rx',3).attr('fill','url(#temp-grad)').attr('stroke','rgba(0,0,0,0.15)').attr('stroke-width',0.5);
  mapSvg.append('text').attr('x',lx).attr('y',ly+lh+12).attr('font-size',9).attr('fill','#888').attr('font-family','sans-serif').text('1°C');
  mapSvg.append('text').attr('x',lx+lw).attr('y',ly+lh+12).attr('text-anchor','end').attr('font-size',9).attr('fill','#888').attr('font-family','sans-serif').text('6.5°C');
  mapSvg.append('text').attr('x',lx+lw/2).attr('y',ly-4).attr('text-anchor','middle').attr('font-size',9).attr('fill','#888').attr('font-family','sans-serif').text('Projected warming 2100');
}

function showTooltip(e, feature) {
  const r = countryToRegion(feature);
  if (!r) return;
  const w = regionWarming(r, flows);
  const tt = document.getElementById('map-tooltip');
  tt.style.display = 'block';
  tt.innerHTML = '<strong>'+r[1]+'</strong>: +'+w.toFixed(1)+'°C';
}

function showRegionTooltip(e, r) {
  const w = regionWarming(r, flows);
  const tt = document.getElementById('map-tooltip');
  tt.style.display = 'block';
  tt.innerHTML = '<strong>'+r[1]+'</strong>: +'+w.toFixed(1)+'°C';
}

function moveTooltip(e) {
  const container = document.getElementById('right-panel').getBoundingClientRect();
  const tt = document.getElementById('map-tooltip');
  tt.style.left = (e.clientX - container.left + 12) + 'px';
  tt.style.top = (e.clientY - container.top - 28) + 'px';
}

function hideTooltip() { document.getElementById('map-tooltip').style.display = 'none'; }

function openDetailPanel(r) {
  selectedRegion = r;
  const w = regionWarming(r, flows);
  document.getElementById('detail-panel').classList.add('visible');
  document.getElementById('detail-name').textContent = r[1];
  document.getElementById('detail-temp').textContent = '+'+w.toFixed(2)+'°C';

  const inner = document.getElementById('dist-inner');
  const unc = r[6];
  inner.style.left = ((0.5-unc/2)*100)+'%';
  inner.style.width = (unc*100)+'%';
  inner.style.background = 'linear-gradient(90deg,'+tempToColor(w*0.8)+','+tempToColor(w*1.2)+')';

  drawSparkline(r, w);

  document.getElementById('sector-bar').innerHTML = r[7].map((sw,i) =>
    '<div class="sector-seg" style="width:'+Math.round(sw*100)+'%;background:'+SECTOR_COLORS[i]+'"></div>'
  ).join('');

  document.querySelectorAll('.region-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === r[0]);
  });
}

function drawSparkline(r, finalTemp) {
  const canvas = document.getElementById('sparkline-canvas');
  const ctx = canvas.getContext('2d');
  const W = (canvas.offsetWidth || 176) * devicePixelRatio;
  const H = (canvas.offsetHeight || 48) * devicePixelRatio;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);
  const pts = [];
  for (let i=0; i<=20; i++) {
    const t = i/20;
    const lateMult = r[5];
    const earlyMult = 1 - lateMult * 0.4;
    const y = finalTemp * (earlyMult * (1-Math.exp(-3*t)) + lateMult * t * 0.5);
    pts.push([t * W, H - (y / (finalTemp*1.1)) * H * 0.85 - H*0.05]);
  }
  ctx.strokeStyle = tempToColor(finalTemp, 0.9).replace(',1)','').replace('rgba','rgb');
  ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.beginPath();
  pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.stroke();
  ctx.fillStyle = '#888';
  ctx.font = (9*devicePixelRatio)+'px sans-serif';
  ctx.fillText('2025', 2, H-2);
  ctx.fillText('2100', W-32, H-2);
}

function applyScenario(key, btn) {
  flows = [...SCENARIOS[key].flows];
  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawSankey();
  updateMap(true);
  updateBottomBar();
}

function pinScenario() {
  pinnedState = [...flows];
  const ghost = d3.select('#ghost-layer');
  ghost.selectAll('*').remove();
  if (worldData) {
    const countries = topojson.feature(worldData, worldData.objects.countries);
    const pFlows = pinnedState;
    ghost.selectAll('.ghost-country').data(countries.features).join('path')
      .attr('d', pathGen).attr('fill','none')
      .attr('stroke', d => {
        const r = countryToRegion(d);
        return r ? tempToColor(regionWarming(r, pFlows), 0.4) : 'none';
      })
      .attr('stroke-width', 2);
  }
  const btn = document.getElementById('pin-btn');
  btn.textContent = '📌 Pinned!';
  setTimeout(() => btn.textContent = '📌 Pin scenario', 2000);
}

function updateHalos() {
  if (!pinnedState || !worldData) return;
  REGIONS.forEach(r => {
    const wNow = regionWarming(r, flows);
    const wPin = regionWarming(r, pinnedState);
    const delta = Math.abs(wNow - wPin);
    const proj = projection([r[3], r[2]]);
    if (!proj) return;
    mapSvg.selectAll('.halo-'+r[0]).remove();
    if (delta > 0.1) {
      mapSvg.append('circle')
        .attr('class','halo-'+r[0])
        .attr('cx', proj[0]).attr('cy', proj[1])
        .attr('r', 6 + delta * 4)
        .attr('fill','none')
        .attr('stroke', wNow > wPin ? '#E24B4A' : '#185FA5')
        .attr('stroke-width', 1.5).attr('opacity', 0.5);
    }
  });
}

function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateBottomBar();
}

function updateBottomBar() {
  let sorted = [...REGIONS];
  if (sortMode === 'warming') sorted.sort((a,b) => regionWarming(b,flows) - regionWarming(a,flows));
  else if (sortMode === 'rate') sorted.sort((a,b) => b[5] - a[5]);
  else sorted.sort((a,b) => b[6] - a[6]);

  const maxW = Math.max(...REGIONS.map(r => regionWarming(r, flows)));
  document.getElementById('region-strip').innerHTML = sorted.map(r => {
    const w = regionWarming(r, flows);
    const pct = Math.round(w / maxW * 100);
    const col = tempToColor(w, 1).replace(',1)','').replace('rgba','rgb');
    return '<div class="region-card" data-id="'+r[0]+'" onclick="openDetailPanel(window.REGION_MAP[\''+r[0]+'\'])">'
      +'<div class="rc-name">'+r[1]+'</div>'
      +'<div class="rc-temp" style="color:'+col+'">+'+w.toFixed(1)+'°C</div>'
      +'<div class="rc-bar"><div class="rc-fill" style="width:'+pct+'%;background:'+tempToColor(w)+'"></div></div>'
      +'</div>';
  }).join('');
}

drawSankey();
updateBottomBar();
initMap();
</script>

</html>
